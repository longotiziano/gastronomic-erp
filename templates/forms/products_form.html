{% extends 'partials/general_form.html' %}

{% block form_content %}
<div class="form-group">
    <label for="name">Nombre del producto:</label>
    <input type="text" id="name" name="name" required>
</div>

<div class="form-group">
    <label for="category_id">Categoría:</label>
    <select id="category_id" name="category_id" required>
        {% for category in categories or [] %}
        <option value="{{ category.id }}">{{ category.name }}</option>
        {% endfor %}
    </select>
</div>

<div class="form-group">
    <label for="bar_id">Bar:</label>
    <select id="bar_id" name="bar_id" required>
        {% for bar in bars or [] %}
        <option value="{{ bar.id }}">{{ bar.name }}</option>
        {% endfor %}
    </select>
</div>

<div class="form-group">
    <label for="price">Precio:</label>
    <input type="number" id="price" name="price" min="0" step="0.01" required>
</div>

<div class="form-group">
    <button type="button" class="btn-edit" id="toggle-recipe-form">Agregar receta</button>
</div>

<div id="recipe-form-section" style="display: none; border: 1px solid #ddd; padding: 1rem; border-radius: 8px; margin-top: 0.5rem;">
    <div class="form-group">
        <label for="recipe_raw_material_id">Receta (materia prima):</label>
        <select id="recipe_raw_material_id" name="recipe_raw_material_id">
            <option value="">-- Sin receta --</option>
            {% for raw_material in raw_materials or [] %}
            <option value="{{ raw_material.id }}">{{ raw_material.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="recipe_amount">Cantidad de la receta:</label>
        <input type="number" id="recipe_amount" name="recipe_amount" min="0" step="0.01">
    </div>
</div>
{% endblock %}
