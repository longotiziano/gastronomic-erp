{#
    abm_mode: boolean = False  
#}

{% extends 'partials/general_form.html' %}

{% block form_content %}

{% if abm_mode %}
<div class="form-group">
    <label for="username">Nombre de usuario:</label>
    <input type="text" id="username" name="name">
</div>
{% endif %}

<div class="form-group">
    <label for="email">Correo electrónico:</label>
    <input type="email" id="email" name="email"
        {% if user and update_user %}value="{{ user.email }}"{% endif %}
        {% if update_user %}disabled{% endif %}
        {% if login or signup %}required{% endif %}>
</div>

<div class="form-group">
    <label for="password">Contraseña:</label>
    <input type="password" id="password" name="password"
        {% if login or signup %}required{% endif %}>
</div>

{% if abm_mode %}
<div class="form-group">
    <label for="confirm_password">Confirmar contraseña:</label>
    <input type="password" id="confirm_password" name="confirm_password"
        {% if signup %}required{% endif %}>
</div>
{% endif %}

{% if abm_mode %}
<div class="form-group">
    <label for="address">Dirección:</label>
    <input type="text" id="address" name="address">
</div>

<div class="form-group">
    <label for="rol">Puesto:</label>
    <select id="rol" name="rol" placeholder="Seleccionar puesto" required>
        <option value="" disabled selected>Seleccionar puesto</option>
        <option value="waiter">Mozo</option>
        <option value="cashier">Cajero</option>
        <option value="administrator">Administrador</option>
        <option value="receptionist">Recepcionista</option>
        <option value="chef">Cocinero</option>
        <option value="chef_assistant">Asistente de Cocina</option>
        <option value="dishes">Bachero</option>
        <option value="manager">Encargado</option>
    </select>
</div>

<div class="form-group">
    <label for="leave_at">Fecha de despido:</label>
    <input type="date" id="leave_at" name="leave_at">
</div>

<div class="form-group">
    <label for="daily_salary">Salario diario:</label>
    <input type="number" id="daily_salary" name="daily_salary" step="1" required>
</div>

<div class="form-group">
    <label for="bar_id">Bar:</label>
    <select id="bar_id" name="bar_id" required>
        {% for bar in bars %}
        <option value="{{ bar.id }}">{{ bar.name }}</option>
        {% endfor %}
    </select>
</div>
{% endif %}

{% endblock %}
