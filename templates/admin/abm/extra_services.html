{% extends 'admin/abm/abm.html' %}

{% block area_js %}
<script type="module" src="{{ url_for('static', filename='js/abm/extra_services.js') }}"></script>
{% endblock %}

{% block abm_form %}
<div class="{{ 'fixed-block' if abm else 'open' }}" data-openby="adminUser">
    <div class="block form-block">
        <div class="block-header">
            <h2>Nuevo servicio</h2>
        </div>

        <form id="form-principal" action="{{ url_for('admin_extra_services.create') }}" method="POST">
            <div class="block-content">

                <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej: Estacionamiento gratuito">
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" placeholder="Descripción del servicio..."></textarea>
                </div>

                <div class="form-group">
                    <label for="activo">Activo</label>
                    <input type="checkbox" id="activo" name="activo" checked>
                </div>

            </div>

            <div class="block-footer">
                <button class="delete-btn" data-formid="eliminarUser" type="button" hidden>
                    Eliminar
                </button>
                <button class="submit-btn cancel-btn" type="button" id="closeAdminUser">Cancelar</button>
                <button class="submit-btn" type="submit">Guardar</button>
            </div>
        </form>

        <form id="eliminarUser" action="" method="POST"></form>
    </div>
</div>
{% endblock %}
