{% extends 'admin/abm/abm.html' %}

{% block area_js %}
<script type="module" src="{{ url_for('static', filename='js/abm/tables.js') }}"></script>
{% endblock %}

{% block abm_form %}
<div class="fixed-block" data-openby="adminUser">
    <div class="block form-block">
        <div class="block-header">
            <h2>Nueva mesa</h2>
        </div>

        <form id="form-principal" action="{{ url_for('admin_tables.create') }}" method="POST">
            <div class="block-content">

                <div class="form-group">
                    <label for="capacity">Capacidad (personas) *</label>
                    <input type="number" id="capacity" name="capacity" min="1" max="20" required>
                </div>

            </div>

            <div class="block-footer">
                <button class="delete-btn" data-formid="eliminarUser" 
                data-confirm-text="¿Estás seguro de que deseas desactivar esta mesa?" 
                type="button" hidden>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-power-icon lucide-power"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.77.04"/></svg>
                </button>
                <button class="submit-btn cancel-btn" type="button" id="closeAdminUser">Cancelar</button>
                <button class="submit-btn" type="submit">Guardar</button>
            </div>
        </form>

        <form id="eliminarUser" action="" method="POST"></form>
    </div>
</div>

{% endblock %}
