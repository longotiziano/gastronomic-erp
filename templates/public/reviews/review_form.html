<div class="fixed-block" data-openby="adminUser">
    <div class="block form-block">
        <div class="block-header">
            <h2>Nueva reseña</h2>
        </div>

        <form id="form-principal" action="{{ url_for('public_reviews.create') }}" method="POST">
            <div class="block-content">

                <div class="form-group" id="reservation-group">
                    <label for="reservation_id">Reserva *</label>
                    <select id="reservation_id" name="reservation_id">
                        <option value="">Seleccioná una reserva...</option>
                        {% for r in reservations %}
                        <option value="{{ r.id }}">Reserva #{{ r.id }} — {{ r.fecha }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Estrellas *</label>
                    <div class="stars-input" role="group">
                        {% for i in range(1, 6) %}
                        <button type="button" class="star-btn" data-value="{{ i }}">★</button>
                        {% endfor %}
                    </div>
                    <input type="hidden" id="stars" name="stars" value="0">
                </div>

                <div class="form-group">
                    <label for="description">Comentario *</label>
                    <textarea id="description" name="description" placeholder="Contanos tu experiencia..." required></textarea>
                </div>

            </div>

            <div class="block-footer">
                <button class="delete-btn" data-formid="eliminarUser" 
                data-confirm-text="¿Estás seguro de que deseas eliminar esta reseña?" 
                type="button" hidden>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
                <button class="submit-btn cancel-btn" type="button" id="closeAdminUser">Cancelar</button>
                <button class="submit-btn" type="submit">Publicar</button>
            </div>
        </form>

        <form id="eliminarUser" action="" method="POST"></form>
    </div>
</div>
